name: Deploy to GitHub Pages (Hybrid Vite + Jekyll)

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 🔧
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Vite (Landing Page) 🔧
        run: |
          npm ci
          npm run build

      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install gems & Build Jekyll (Blog) 🔧
        run: |
          cd blog
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3
          JEKYLL_ENV=production bundle exec jekyll build \
            --source . \
            --destination _site \
            --baseurl /portfolio/blog
          cd ..

      - name: Merge Builds 📦
        run: |
          mkdir -p dist/blog
          cp -R blog/_site/. dist/blog/
          touch dist/.nojekyll

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
