title: t3chw1z4rd's Blog
tagline: Pentester · Aspiring AI RedTeamer
description: Explore technical writeups and deep dives into AI RedTeaming and Cyber Security.

theme: jekyll-theme-chirpy

author:
  name: t3chw1z4rd
  email:gkpl0010@gmail.com
  twitter: gkpl0010
  github: Patrickleondev

url: "https://patrickleondev.github.io"
baseurl: "/portfolio/blog"

# Social Links
social:
  name: t3chw1z4rd
  links:
    - https://www.linkedin.com/in/patrick-léon-gandonou
    - https://github.com/Patrickleondev
    - https://x.com/gkpl0010

# Jekyll plugins
plugins:
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-archives
  - jekyll-include-cache

# Pagination settings
paginate: 10
paginate_path: /page:num/

# Markdown Settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Chirpy settings
lang: fr-FR
timezone: UTC
avatar: ''
theme_mode:

sass:
  style: compressed

# Build settings
exclude:
  - Gemfile
  - vendor
  - .github
  - Dockerfile
  - README.md
  - LICENSE
  - "*.sh"
  - node_modules

# Jekyll Collections — required by Chirpy for sidebar tabs
collections:
  tabs:
    output: true
    sort_by: order

# Archive settings (for tags and categories)
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/
